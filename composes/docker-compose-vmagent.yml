name: monitoring-instance

services:
  vmagent:
    image: victoriametrics/vmagent:v1.139.0
    container_name: vmagent-instance
    networks:
      - host-monitoring-network
    extra_hosts:
      - "vm.voidpath.local:$VM_IP"

    volumes:
      - vmagent-data:/vmagentdata:rw
      - ../certs:/certs:ro
      - ../vmagent/scrape_config.yml:/etc/prometheus/scrape_config.yml:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8429/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    command: 
      - "-promscrape.config=/etc/prometheus/scrape_config.yml"
      - "-remoteWrite.url=$VM_REMOTE_WRITE_URL"
      - "-remoteWrite.label='instance=$HOSTNAME'"
      - "-remoteWrite.tlsCAFile=/certs/ca-chain.crt"
      - "-remoteWrite.tlsCertFile=/certs/vm.crt"
      - "-remoteWrite.tlsKeyFile=/certs/vm.key"
      - "-remoteWrite.basicAuth.username=$VM_REMOTE_WRITE_USERNAME"
      - "-remoteWrite.basicAuth.password=$VM_REMOTE_WRITE_PASSWORD"

  nginx:
    image: nginx:1.29.7-alpine-slim
    container_name: vm-nginx-instance
    restart: unless-stopped

    depends_on:
      vmagent:
        condition: service_healthy

    networks:
      - host-monitoring-network
    extra_hosts:
      - "vm.voidpath.local:$VM_IP"
    ports:
      - "$VMAGENT_IP_ADDRESS:$VMAGENT_PORT:8428"

    volumes:
      - ../nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/config/.htpasswd:/etc/nginx/.htpasswd:ro
      - ../nginx/config/common_security.conf:/etc/nginx/common_security.conf:ro
      - ../nginx/config/proxy_params:/etc/nginx/proxy_params:ro
      - ../certs:/etc/nginx/certs:ro
    
    mem_limit: 512M
    cpus: "1.0"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

    healthcheck:
      test: [
        "CMD", 
        "wget", 
        "--no-check-certificate", 
        "-q", 
        "-O", 
        "-", 
        "https://127.0.0.1:8428/health",
      ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  vmagent-data:
