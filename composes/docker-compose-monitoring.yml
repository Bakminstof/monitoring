name: monitoring-instance

services:
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: cadvisor
    networks:
      - host-monitoring-network
    
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    networks:
      - host-monitoring-network

    hostname: $HOSTNAME

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  vmagent:
    depends_on:
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy
    
    volumes:
      - ../vmagent/configs/prometheus.yml:/etc/prometheus/configs/prometheus.yml:ro
