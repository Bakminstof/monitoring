name: monitoring

services:
  smartctl-exporter:
    image: prometheuscommunity/smartctl-exporter:v0.14.0
    container_name: smartctl-exporter
    networks:
      - host-monitoring-network

    privileged: true
    volumes:
      - /dev:/dev:ro
      - /run/udev:/run/udev:ro
    mem_limit: 256m
    cpus: 0.5
    user: root
    command:
      - '--smartctl.path=/usr/sbin/smartctl'
      - '--web.listen-address=:9633'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9633/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  vmagent:
    depends_on:
      smartctl-exporter:
        condition: service_healthy
    
    volumes:
      - ../vmagent/configs/prometheus-devices.yml:/etc/prometheus/configs/prometheus-devices.yml:ro
